<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support CRM</title>
    <!-- Tailwind CSS via CDN - no installation needed -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navigation bar shown on all pages -->
    <nav class="bg-blue-600 text-white px-6 py-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold">Support CRM</a>
            <a href="/create" class="bg-white text-blue-600 px-4 py-2 rounded font-semibold hover:bg-blue-50">
                + New Ticket
            </a>
        </div>
    </nav>

    <!-- Main content area - each page fills this block -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
